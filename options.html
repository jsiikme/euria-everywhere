<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Sovereign AI Panel</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px; color: #1e293b; padding: 16px; min-width: 420px;
    }
    h1 { font-size: 17px; margin: 0 0 14px; }
    label { display: block; font-weight: 600; margin: 12px 0 4px; }
    input, select {
      width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1;
      border-radius: 8px; font-size: 13px; font-family: inherit; box-sizing: border-box;
      background: #fff;
    }
    .hint { color: #64748b; font-size: 12px; margin-top: 3px; }
    .access {
      background: #f2f6fe; border: 1px solid #c7d7f5; border-radius: 8px;
      padding: 9px 12px; margin: 0 0 14px; font-size: 12.5px; color: #334155;
    }
    .access a { color: #2f6bff; font-weight: 600; text-decoration: none; }
    .access a:hover { text-decoration: underline; }
    .access .sep { color: #94a3b8; margin: 0 6px; }
    button {
      margin-top: 16px; background: #2f6bff; color: #fff; border: none;
      border-radius: 8px; padding: 9px 18px; font-size: 14px; cursor: pointer;
    }
    button:hover { background: #1f56e0; }
    #status { color: #15803d; font-size: 13px; margin-left: 10px; }
    #status.error { color: #b42318; }
  </style>
</head>
<body>
  <h1 id="t-title">Sovereign AI Panel</h1>

  <div class="access">
    <span id="t-needAccess">No access yet?</span>
    <a id="lnk-service" href="https://www.infomaniak.com/en/hosting/ai-services" target="_blank" rel="noopener noreferrer">Get AI Services (1M free credits)</a>
    <span class="sep">·</span>
    <a id="lnk-token" href="https://manager.infomaniak.com/v3/ng/profile/user/token/list" target="_blank" rel="noopener noreferrer">Create an API token</a>
  </div>

  <label for="uiLang" id="t-language">Interface language</label>
  <select id="uiLang">
    <option value="auto" id="t-langAuto">Automatic (browser language)</option>
    <option value="fr">Français</option>
    <option value="en">English</option>
  </select>

  <label for="productId" id="t-productId">AI Services product ID</label>
  <input id="productId" type="text" inputmode="numeric" spellcheck="false" placeholder="12345">
  <div class="hint" id="t-productHint">Your AI Services product number, shown in the Infomaniak Manager (e.g. 12345).</div>

  <label for="apiToken" id="t-apiToken">API token (Bearer)</label>
  <input id="apiToken" type="password" spellcheck="false">
  <div class="hint" id="t-hint">Infomaniak AI Tools token. Never share this token.</div>

  <label for="model" id="t-model">Model</label>
  <input id="model" type="text" spellcheck="false">

  <label for="maxPageChars" id="t-maxPageChars">Max size of page content sent (characters)</label>
  <input id="maxPageChars" type="number" min="1000" step="1000">

  <button id="save">Save</button><span id="status"></span>

  <script src="defaults.js"></script>
  <script src="options.js"></script>
</body>
</html>
